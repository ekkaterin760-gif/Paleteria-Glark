<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pedidos | Paletería Glark</title>

    <link rel="stylesheet" href="../css/estilos.css">
</head>

<body>

    <nav>
        <a href="../index.html">Inicio</a>
        <a href="../paginas/nosotros.html">Nosotros</a>
        <a href="../paginas/productos.html">Productos</a>
        <a href="../paginas/contactos.html">Contacto</a>
        <a href="../paginas/pedidos.html">Pedidos</a>
    </nav>

    <section>

        <h2>Carrito de Pedidos</h2>

        <div class="cart">

            <h3>Datos del Cliente</h3>

            <input 
                type="text" 
                id="nombre" 
                placeholder="Ingresa tu nombre"
            >

            <br><br>

            <input 
                type="text" 
                id="ubicacion" 
                placeholder="Ingresa tu ubicación"
            >

            <br><br>

            <h3>Carrito</h3>

            <ul id="cart-items"></ul>

            <p>
                Total: $
                <span id="cart-total">0</span>
            </p>

            <button onclick="sendWhatsAppOrder()">
                Enviar por WhatsApp
            </button>

<br><br>

<button onclick="resetCart()">
🗑️ Reiniciar Pedido
</button>

    </section>
        </div>
		



<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCart(){

    let cartItems =
    document.getElementById("cart-items");

    let total =
    document.getElementById("cart-total");

    cartItems.innerHTML = "";

    let totalPrice = 0;

    cart.forEach(item => {

        cartItems.innerHTML += `
        <li>
        ${item.product} - $${item.price}
        </li>
        `;

        totalPrice += item.price;

    });

    total.textContent = totalPrice;

}

function sendWhatsAppOrder(){

    if(cart.length === 0){

        alert("El carrito está vacío");
        return;

    }

    let nombre =
    document.getElementById("nombre").value;

    let ubicacion =
    document.getElementById("ubicacion").value;

    if(nombre === "" || ubicacion === ""){

        alert("Completa tu nombre y ubicación");
        return;

    }

    let message =
    "🍦 Hola, quiero pedir:%0A%0A";

    message +=
    `👤 Nombre: ${nombre}%0A`;

    message +=
    `📍 Ubicación: ${ubicacion}%0A%0A`;

    let total = 0;

    cart.forEach(item => {

        message +=
        `• ${item.product} - $${item.price}%0A`;

        total += item.price;

    });

    message +=
    `%0A💰 Total: $${total}`;

    window.open(
    `https://wa.me/529961079618?text=${message}`,
    "_blank"
    );

}

updateCart();

</script>

<script>

function resetCart(){

    localStorage.removeItem("cart");

    cart = [];

    updateCart();

    alert("El pedido fue reiniciado");

}

</script>

</body>

</html>
